<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
<style>
text { font-family: Arial, sans-serif; fill: #14213d; }
.title { font-size: 34px; font-weight: 700; }
.subtitle { font-size: 18px; fill: #44556b; }
.box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
.step { font-size: 24px; font-weight: 700; }
.body { font-size: 17px; fill: #334155; }
.metric { font-size: 38px; font-weight: 700; }
.metric-label { font-size: 18px; fill: #475569; }
.small { font-size: 15px; fill: #64748b; }
</style>
<rect x="0" y="0" width="1400" height="860" fill="#ffffff"/>
<text class="title" x="70" y="70">Curated Search Campaign Scale</text>
<text class="subtitle" x="70" y="105">Numbers below are computed directly from the saved `good_results` archives.</text>
<rect class="box" x="70" y="150" width="190" height="130"/>
<text class="metric" x="92" y="212">6</text>
<text class="metric-label" x="92" y="248">AWS Batch runs</text>
<rect class="box" x="290" y="150" width="190" height="130"/>
<text class="metric" x="312" y="212">2</text>
<text class="metric-label" x="312" y="248">trajectory families</text>
<rect class="box" x="510" y="150" width="270" height="130"/>
<text class="metric" x="532" y="212">1.026B</text>
<text class="metric-label" x="532" y="248">objective evaluations</text>
<rect class="box" x="820" y="150" width="190" height="130"/>
<text class="metric" x="842" y="212">17.12 h</text>
<text class="metric-label" x="842" y="248">recorded wall time</text>
<rect class="box" x="1040" y="150" width="270" height="130"/>
<text class="metric" x="1062" y="212">234,994</text>
<text class="metric-label" x="1062" y="248">archived candidates</text>
<rect class="box" x="70" y="320" width="220" height="130"/>
<text class="metric" x="92" y="382">600</text>
<text class="metric-label" x="92" y="418">reconstructed top candidates</text>
<text class="subtitle" x="70" y="520">Per-family breakdown</text>
<text class="step" x="70" y="546">02 Delta-V EGA</text>
<rect class="box" x="70" y="560" width="760" height="34"/>
<rect x="70" y="560" width="507" height="34" fill="#4f772d" rx="18" ry="18"/>
<text class="body" x="860" y="585">410.8M evals, 4.60 h, best DSM 1.961 km/s</text>
<text class="step" x="70" y="630">04 VEEGA</text>
<rect class="box" x="70" y="644" width="760" height="34"/>
<rect x="70" y="644" width="760" height="34" fill="#fca311" rx="18" ry="18"/>
<text class="body" x="860" y="669">615.4M evals, 12.52 h, best DSM 0.613 km/s</text>
<text class="subtitle" x="70" y="760">Detailed archive payload</text>
<text class="body" x="70" y="795">4,200 saved events, 1,800 saved legs, and 231,000 dense trajectory samples across the 600 detailed candidate files.</text>
</svg>
